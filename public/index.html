<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资讯首页 - 农机行业通</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-slot"></div>

  <main class="main-content">
    <header class="page-header">
      <h1 class="page-title">资讯首页</h1>
      <div class="flex flex-center gap-8">
        <span id="fetch-time" class="text-muted text-sm"></span>
        <button class="btn btn-primary" id="fetch-btn" onclick="fetchNews()">↻ 拉取最新</button>
      </div>
    </header>

    <div class="page-body">
      <div class="source-tabs" id="source-tabs">
        <button class="tab-btn active" onclick="filterSource('all', this)">全部</button>
      </div>

      <div class="fetch-bar">
        <span class="fetch-status" id="fetch-status">点击「拉取最新」从信源获取资讯</span>
        <span id="translate-hint" class="text-sm text-muted hidden">已开启翻译的信源将在后台异步翻译</span>
      </div>

      <div id="news-container">
        <div class="empty-state">
          <div class="empty-icon">🌱</div>
          <p>暂无资讯，点击上方「拉取最新」开始获取</p>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- News Detail Modal -->
<div class="modal-overlay hidden" id="detail-modal" onclick="closeDetailModal(event)">
  <div class="modal detail-modal">
    <div class="detail-modal-header">
      <span class="source-tag" id="detail-source"></span>
      <span class="card-time" id="detail-time"></span>
    </div>
    <h2 class="detail-title" id="detail-title"></h2>
    <div class="detail-modal-body">
      <div class="detail-section" id="detail-summary-section">
        <div class="detail-section-label">完整摘要</div>
        <p class="detail-body" id="detail-summary"></p>
      </div>
    </div>
    <div class="detail-footer">
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('detail-modal').classList.add('hidden')">关闭</button>
      <a id="detail-link" href="#" target="_blank" rel="noopener" class="btn btn-primary btn-sm">查看原文 ↗</a>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
